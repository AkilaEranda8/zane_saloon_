services:
  # ── Nginx Reverse Proxy (handles subdomain routing) ──────────────────────
  proxy:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
      - phpmyadmin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    profiles:
      - certbot

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-zanesalon}
    # Do NOT expose MySQL port to the host in production
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_PASS:-rootpass}
      DB_NAME: ${DB_NAME:-zanesalon}
      JWT_SECRET: ${JWT_SECRET:-zanesalon_docker_jwt_secret_change_me}
      PORT: 5000
    expose:
      - "5000"
    ports:
      - "${BACKEND_PORT:-5001}:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  phpmyadmin:
    image: phpmyadmin:5
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpass}
    expose:
      - "80"

  # One-off seed runner
  seed:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASS: ${DB_PASS:-rootpass}
      DB_NAME: ${DB_NAME:-zanesalon}
      JWT_SECRET: ${JWT_SECRET:-zanesalon_docker_jwt_secret_change_me}
    command: node scripts/seedAll.js
    profiles:
      - seed

volumes:
  mysql_data:
  uploads_data:
  certbot_www:
  certbot_conf:
