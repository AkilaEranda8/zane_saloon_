# ── Nginx reverse-proxy for zanesalon.com subdomains ──────────────────────────
# main.zanesalon.com  →  frontend container (port 80)
# api.zanesalon.com   →  backend  container (port 5000)
# pma.zanesalon.com   →  phpmyadmin container (port 80)

# ── HTTP → HTTPS redirect + ACME challenge ───────────────────────────────────
server {
    listen 80;
    server_name zanesalon.com www.zanesalon.com main.zanesalon.com api.zanesalon.com pma.zanesalon.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── zanesalon.com / www.zanesalon.com → redirect to main.zanesalon.com ─────────
server {
    listen 443 ssl;
    http2 on;
    server_name zanesalon.com www.zanesalon.com;

    ssl_certificate     /etc/letsencrypt/live/main.zanesalon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/main.zanesalon.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    return 301 https://main.zanesalon.com$request_uri;
}

# ── main.zanesalon.com (Frontend) — HTTPS ────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name main.zanesalon.com;

    ssl_certificate     /etc/letsencrypt/live/main.zanesalon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/main.zanesalon.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket for Socket.io
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── api.zanesalon.com (Backend API) — HTTPS ──────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name api.zanesalon.com;

    ssl_certificate     /etc/letsencrypt/live/main.zanesalon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/main.zanesalon.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;
    # Security headers
    add_header X-Frame-Options            "DENY"                                     always;
    add_header X-Content-Type-Options     "nosniff"                                  always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"          always;
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains"      always;
    location / {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── pma.zanesalon.com (phpMyAdmin) — HTTPS ───────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name pma.zanesalon.com;

    ssl_certificate     /etc/letsencrypt/live/main.zanesalon.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/main.zanesalon.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://phpmyadmin:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Default: reject unknown hosts ────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
