# ── Nginx reverse-proxy for zanesalon.com subdomains ──────────────────────────
# main.zanesalon.com  →  frontend container (port 80)
# api.zanesalon.com   →  backend  container (port 5000)
# pma.zanesalon.com   →  phpmyadmin container (port 80)

# ── main.zanesalon.com (Frontend) ────────────────────────────────────────────
server {
    listen 80;
    server_name main.zanesalon.com;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket for Socket.io (goes through frontend nginx → backend)
    location /socket.io/ {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── api.zanesalon.com (Backend API) ──────────────────────────────────────────
server {
    listen 80;
    server_name api.zanesalon.com;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
    }

    # WebSocket
    location /socket.io/ {
        proxy_pass         http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── pma.zanesalon.com (phpMyAdmin) ───────────────────────────────────────────
server {
    listen 80;
    server_name pma.zanesalon.com;

    client_max_body_size 50M;

    location / {
        proxy_pass         http://phpmyadmin:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Default: reject unknown hosts ────────────────────────────────────────────
server {
    listen 80 default_server;
    server_name _;
    return 444;
}
