map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

# ════════════════════════════════════════════════════════════════════════════
# xanesalon.com  — Public Website
# ════════════════════════════════════════════════════════════════════════════

# HTTP → HTTPS + ACME challenge
server {
  listen 80;
  server_name xanesalon.com www.xanesalon.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://xanesalon.com$request_uri;
  }
}

# HTTPS — Public Website
server {
  listen 443 ssl;
  server_name xanesalon.com www.xanesalon.com;
  client_max_body_size 20M;

  ssl_certificate     /etc/letsencrypt/live/xanesalon.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/xanesalon.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  # www → non-www redirect
  if ($host = www.xanesalon.com) {
    return 301 https://xanesalon.com$request_uri;
  }

  location / {
    proxy_pass http://website:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# ════════════════════════════════════════════════════════════════════════════
# main.xanesalon.com  — Management System (Frontend + AI Bot)
# ════════════════════════════════════════════════════════════════════════════

server {
  listen 80;
  server_name main.xanesalon.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name main.xanesalon.com;
  client_max_body_size 20M;

  ssl_certificate     /etc/letsencrypt/live/xanesalon.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/xanesalon.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  location / {
    proxy_pass http://frontend:80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /aibot/ {
    proxy_pass http://aibot:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /socket.io/ {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
  }
}

# ════════════════════════════════════════════════════════════════════════════
# api.xanesalon.com  — Backend REST API
# ════════════════════════════════════════════════════════════════════════════

server {
  listen 80;
  server_name api.xanesalon.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl;
  server_name api.xanesalon.com;
  client_max_body_size 20M;

  ssl_certificate     /etc/letsencrypt/live/xanesalon.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/xanesalon.com/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Cookie $http_cookie;
  }

  location /socket.io/ {
    proxy_pass http://backend:5000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_cache_bypass $http_upgrade;
  }
}

